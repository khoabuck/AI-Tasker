name: CI - Build Backend and Frontend

on:
  pull_request:
    branches:
      - develop
      - main

  push:
    branches:
      - develop
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-build:
    name: Backend - .NET Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore backend dependencies
        run: dotnet restore AITasker.Api/AITasker.Api.csproj

      - name: Build backend
        run: dotnet build AITasker.Api/AITasker.Api.csproj --configuration Release --no-restore

  frontend-build:
    name: Frontend - React Vite Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      VITE_API_BASE_URL: https://api.aitasker.dpdns.org/api
      VITE_BACKEND_BASE_URL: https://api.aitasker.dpdns.org

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build